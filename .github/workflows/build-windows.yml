name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller "GotKeyd Commission Tracker Windows.spec"

      - name: Zip the build
        run: |
          Compress-Archive -Path "dist/GotKeyd Commission Tracker/*" -DestinationPath "GotKeyd-Commission-Tracker-Windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GotKeyd-Commission-Tracker-Windows
          path: GotKeyd-Commission-Tracker-Windows.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GotKeyd-Commission-Tracker-Windows.zip
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller "GotKeyd Commission Tracker.spec"

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R "dist/GotKeyd Commission Tracker.app" dmg_staging/
          hdiutil create -volname "GotKeyd Commission Tracker" \
            -srcfolder dmg_staging -ov -format UDZO \
            GotKeyd-Commission-Tracker-Mac.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GotKeyd-Commission-Tracker-Mac
          path: GotKeyd-Commission-Tracker-Mac.dmg

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: GotKeyd-Commission-Tracker-Mac.dmg
          generate_release_notes: true
